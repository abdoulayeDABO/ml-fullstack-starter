services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ml-api
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ml-frontend
    ports:
      - "80:8080"
    depends_on:
      - api
    restart: unless-stopped
